name: Sync to Gitee Mirror

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'gitee-mirror'
  cancel-in-progress: true

jobs:
  build-and-mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build with Gitee baseURL
        run: hugo --minify --baseURL "https://songsir_1_0.gitee.io/songsir-hub.github.io/"

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          cd public
          git init -b master
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Mirror sync from GitHub: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force "https://oauth2:${GITEE_TOKEN}@gitee.com/songsir_1_0/songsir-hub.github.io.git" HEAD:master
