# ============================================================
# Hugo + Ananke 主题博客配置
# ============================================================

baseURL = 'https://songsir-hub.github.io/'
locale = 'zh-cn'
title = "SongSir'BLOG"
theme = 'ananke'

enableRobotsTXT = true
paginate = 10

# 首页额外输出 JSON（供站内搜索建立索引）
[outputs]
  home = ['HTML', 'RSS', 'JSON']

# 允许 Markdown 中的原始 HTML（用于古典文章样式）
[markup.goldmark.renderer]
  unsafe = true

# ============================================================
# Ananke 主题参数
# ============================================================
[params]
  author = 'SongSir'
  favicon = ''
  site_logo = ''
  description = '技术 · 历史 · 生活，记录所思所想'
  background_color_class = 'bg-dark-gray'
  body_classes = 'avenir bg-near-white'
  recent_posts_number = 3
  # 首页背景图（博雅之璧）
  background_image = '/images/background.jpg'

[params.ananke]
  custom_css = ["custom.css"]
  show_recent_posts = true
  show_categories = true
  copy_code = true

[params.ananke.home]
  content_alignment = 'center'

# ============================================================
# 社交链接
# ============================================================
[params.ananke.social]
  icon_path = 'ananke/socials/%s.svg'

[params.ananke.social.follow]
  new_window_icon = true
  networks = [
    'github',
    'rss'
  ]

[params.ananke.social.share]
  icons = true
  sharetext = true
  networks = [
    'email',
    'x-twitter',
    'linkedin'
  ]

[params.ananke.social.networks.github]
  slug = 'github'
  label = 'GitHub'
  profile = 'https://github.com/songsir-hub/'
  icon = 'github'

[params.ananke.social.networks.rss]
  slug = 'rss'
  label = 'RSS'
  profile = ''
  icon = 'rss'

# ============================================================
# 菜单导航（三栏下拉：科技博览 / 历史文化 / 健身养生）
# - 原“首页/文章/分类”由品牌链接 + 三栏下拉替代
# - 子菜单 parent 指向对应分类页 /categories/<分类名>/
# - 各子栏目分类页为占位（content/categories/<名>/_index.md），
#   待对应文章归入该分类后即自动填充
# ============================================================
