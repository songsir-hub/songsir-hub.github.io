name: Build Gitee Pages branch

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'gitee-branch'
  cancel-in-progress: true

jobs:
  build-and-push-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build with Gitee baseURL
        run: hugo --minify --baseURL "https://songsir_1_0.gitee.io/songsir-hub.github.io/"

      - name: Push built site to gitee branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init -b gitee
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Build for Gitee: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/songsir-hub/songsir-hub.github.io.git" HEAD:gitee
