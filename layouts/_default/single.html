{{/* ─── 单篇文章页：继承 Ananke 主题，底部加 Giscus 评论 ─── */}}
{{ define "main" }}

  <article class="post">
    <!-- 文章标题已由 page-header hero 显示，此处仅保留日期/分类 -->
    <header class="post-header mb4">
      <div class="f6 mid-gray">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
        {{ with .Params.categories }}
          <span class="ml3">
            {{ range . }}
              <a href="/categories/{{ . | urlize }}/" class="link mid-gray hover-dark-gray mr2">#{{ . }}</a>
            {{ end }}
          </span>
        {{ end }}
      </div>
    </header>

    <!-- 文章正文 -->
    <div class="post-content lh-copy">
      {{ .Content }}
    </div>
  </article>

  <!-- Giscus 评论 -->
  {{- partials.Include "comments.html" . -}}

{{ end }}
