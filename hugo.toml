# ============================================================
# Hugo + Ananke 主题博客配置
# ============================================================

baseURL = 'https://songsir-hub.github.io/'
locale = 'zh-cn'
title = "SongSir'BLOG"
theme = 'ananke'

enableRobotsTXT = true
paginate = 10
 summaryLength = 100  # 摘要长度（词数）

# 允许 Markdown 中的原始 HTML（用于古典文章样式）
[markup.goldmark.renderer]
  unsafe = true

# ============================================================
# Ananke 主题参数
# ============================================================
[params]
  author = 'SongSir'
  favicon = ''
  site_logo = ''
  description = '技术 · 历史 · 生活，记录所思所想'
  background_color_class = 'bg-dark-gray'
  body_classes = 'avenir bg-near-white'
  recent_posts_number = 3
  # 首页背景图（博雅之璧）
  background_image = '/images/background.jpg'

[params.ananke]
  custom_css = ["custom.css"]
  show_recent_posts = true
  show_categories = true
  copy_code = true

[params.ananke.home]
  content_alignment = 'center'

# ============================================================
# 社交链接
# ============================================================
[params.ananke.social]
  icon_path = 'ananke/socials/%s.svg'

[params.ananke.social.follow]
  new_window_icon = true
  networks = [
    'github',
    'rss'
  ]

[params.ananke.social.share]
  icons = true
  sharetext = true
  networks = [
    'email',
    'x-twitter',
    'linkedin'
  ]

[params.ananke.social.networks.github]
  slug = 'github'
  label = 'GitHub'
  profile = 'https://github.com/songsir-hub/'
  icon = 'github'

[params.ananke.social.networks.rss]
  slug = 'rss'
  label = 'RSS'
  profile = ''
  icon = 'rss'

# ============================================================
# 菜单导航
# ============================================================
[[menus.main]]
  name = '首页'
  pageRef = '/'
  weight = 10

[[menus.main]]
  name = '文章'
  pageRef = '/posts'
  weight = 20

[[menus.main]]
  name = '分类'
  pageRef = '/categories'
  weight = 30

[[menus.main]]
  name = '标签'
  pageRef = '/tags'
  weight = 40

[[menus.main]]
  name = '关于'
  pageRef = '/about'
  weight = 50
