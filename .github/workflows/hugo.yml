name: Deploy Hugo site to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-gitee:
    if: ${{ secrets.GITEE_TOKEN != '' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build for Gitee
        run: hugo --minify --baseURL https://songsir.gitee.io/songsir-hub.github.io/

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          cd public
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "mirror: ${{ github.sha }}"
          git push -f "https://Songsir:${GITEE_TOKEN}@gitee.com/Songsir/songsir-hub.github.io.git" HEAD:master

      - name: Trigger Gitee Pages rebuild
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          curl -X POST "https://gitee.com/api/v5/repos/Songsir/songsir-hub.github.io/pages/builds" \
            -H "Authorization: token ${GITEE_TOKEN}"
