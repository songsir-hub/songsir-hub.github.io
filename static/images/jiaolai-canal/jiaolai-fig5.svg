<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="680" height="360">
        <defs>
          <linearGradient id="waterGrad2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5ba4cf"/>
            <stop offset="100%" stop-color="#3a7fb0"/>
          </linearGradient>
        </defs>
        <rect width="680" height="360" fill="#f0f4e8"/>
        <!-- 标题 -->
        <text x="340" y="20" text-anchor="middle" font-size="14" fill="#1a3c5e" font-weight="bold">胶莱运河通航工程示意图</text>

        <!-- ====== 莱州湾（北方/上方）====== -->
        <rect x="270" y="35" width="130" height="22" rx="5" fill="#a8d4f0" opacity="0.6"/>
        <text x="335" y="50" text-anchor="middle" font-size="11" fill="#2a6b8e" font-weight="bold">莱州湾（渤海）</text>
        <text x="420" y="50" font-size="10" fill="#1a3c5e" font-weight="bold">↑ 北</text>

        <!-- ====== 河道（从北到南，上到下）====== -->
        <path d="M335,60 Q315,105 325,155 Q332,172 330,180 Q328,190 318,245 Q308,300 335,330" stroke="url(#waterGrad2)" stroke-width="18" fill="none" opacity="0.7"/>

        <!-- ====== 分水岭高地（中央）====== -->
        <ellipse cx="328" cy="183" rx="52" ry="26" fill="#8fbc8f" opacity="0.6"/>
        <text x="328" y="180" text-anchor="middle" font-size="11" fill="#2c5f2c" font-weight="bold">分水岭</text>
        <text x="328" y="194" text-anchor="middle" font-size="8" fill="#2c5f2c">平度姚家</text>

        <!-- ====== 北胶莱河标注（上半部）====== -->
        <text x="395" y="95" font-size="13" fill="#1a3c5e" font-weight="bold">北胶莱河</text>
        <text x="395" y="110" font-size="10" fill="#555">↖ 通莱州湾</text>

        <!-- ====== 南胶莱河标注（下半部）====== -->
        <text x="395" y="275" font-size="13" fill="#1a3c5e" font-weight="bold">南胶莱河</text>
        <text x="395" y="290" font-size="10" fill="#555">↘ 通胶州湾</text>

        <!-- ====== 九闸（北段在上、南段在下）====== -->
        <g fill="#c0392b" stroke="#fff" stroke-width="2">
          <!-- 北段闸（从莱州湾到分水岭） -->
          <rect x="313" y="80" width="10" height="25" rx="2"/><text x="318" y="75" text-anchor="middle" font-size="8" fill="#c0392b">新河闸</text>
          <rect x="320" y="120" width="10" height="25" rx="2"/><text x="325" y="115" text-anchor="middle" font-size="8" fill="#c0392b">亭口闸</text>
          <rect x="326" y="155" width="10" height="20" rx="2"/><text x="331" y="150" text-anchor="middle" font-size="8" fill="#c0392b">周家闸</text>
          <!-- 南段闸（从分水岭到胶州湾） -->
          <rect x="313" y="225" width="10" height="25" rx="2"/><text x="318" y="220" text-anchor="middle" font-size="8" fill="#c0392b">窝铺闸</text>
          <rect x="310" y="270" width="10" height="25" rx="2"/><text x="315" y="265" text-anchor="middle" font-size="8" fill="#c0392b">吴家口</text>
          <rect x="318" y="310" width="10" height="20" rx="2"/><text x="323" y="305" text-anchor="middle" font-size="8" fill="#c0392b">陈村闸</text>
        </g>

        <!-- ====== 胶州湾（南方/下方）====== -->
        <rect x="270" y="330" width="130" height="22" rx="5" fill="#a8d4f0" opacity="0.6"/>
        <text x="335" y="345" text-anchor="middle" font-size="11" fill="#2a6b8e" font-weight="bold">胶州湾（黄海）</text>
        <text x="420" y="345" font-size="10" fill="#1a3c5e" font-weight="bold">↓ 南</text>

        <!-- ====== 水源系统（右侧标注）====== -->
        <text x="510" y="65" font-size="12" fill="#2a6b8e" font-weight="bold">水源系统</text>
        <!-- 胶河 → 都泊水柜（分水岭） -->
        <line x1="500" y1="80" x2="375" y2="175" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="510" y="85" font-size="10" fill="#555">胶河 ↙</text>
        <text x="510" y="98" font-size="8" fill="#888">（都泊水柜调蓄）</text>
        <!-- 五龙河（潍坊）→ 北段 -->
        <line x1="500" y1="115" x2="340" y2="110" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="510" y="120" font-size="10" fill="#555">五龙河（潍坊）↙</text>
        <!-- 白沙河 → 南段 -->
        <line x1="500" y1="145" x2="335" y2="255" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="510" y="150" font-size="10" fill="#555">白沙河 ↙</text>

        <!-- ====== 都泊（夷安泽）水柜标注 ====== -->
        <ellipse cx="355" cy="175" rx="20" ry="7" fill="#3a7fb0" opacity="0.5"/>
        <text x="380" y="178" font-size="8" fill="#2a6b8e" font-weight="bold">都泊</text>
      </svg>