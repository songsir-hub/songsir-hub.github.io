name: Debug Hugo Build
on:
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Build
        run: hugo --minify 2>&1 | tee build-error.log
      - name: Push error log
        if: always()
        run: |
          git config user.name "debug-bot"
          git config user.email "debug@github.com"
          git checkout -b debug-build-error
          git add -A
          git commit -m "debug: hugo build output" || true
          git push origin debug-build-error || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
